services:
  postgres:
    image: postgres:16
    profiles: ["postgres"]
    environment:
      POSTGRES_DB: ${OA_POSTGRES_DB:-openarchive}
      POSTGRES_USER: ${OA_POSTGRES_USER:-openarchive}
      POSTGRES_PASSWORD: ${OA_POSTGRES_PASSWORD:-openarchive}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U openarchive -d openarchive"]
      interval: 5s
      timeout: 5s
      retries: 12

  app:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
        required: false
      oracle:
        condition: service_started
        required: false
    environment:
      OA_RELATIONAL_STORE: ${OA_RELATIONAL_STORE:-postgres}
      OA_POSTGRES_URL: ${OA_POSTGRES_URL:-postgres://openarchive:openarchive@postgres:5432/openarchive}
      OA_ORACLE_CONNECT_STRING: ${OA_DOCKER_ORACLE_CONNECT_STRING:-oracle:1521/FREEPDB1}
      OA_ORACLE_USERNAME: ${OA_ORACLE_USERNAME:-system}
      OA_ORACLE_PASSWORD: ${OA_ORACLE_PASSWORD:-openarchive}
      OA_ORACLE_CALL_TIMEOUT_MS: ${OA_ORACLE_CALL_TIMEOUT_MS:-30000}
      OA_DB_POOL_MIN: ${OA_DB_POOL_MIN:-1}
      OA_DB_POOL_MAX: ${OA_DB_POOL_MAX:-8}
      OA_DB_POOL_INCREMENT: ${OA_DB_POOL_INCREMENT:-1}
      OA_DB_POOL_STMT_CACHE_SIZE: ${OA_DB_POOL_STMT_CACHE_SIZE:-50}
      OA_DB_POOL_GET_TIMEOUT_MS: ${OA_DB_POOL_GET_TIMEOUT_MS:-30000}
      OA_DB_POOL_PING_INTERVAL_MS: ${OA_DB_POOL_PING_INTERVAL_MS:-60000}
      OA_OBJECT_STORE: ${OA_OBJECT_STORE:-local_fs}
      OA_OBJECT_STORE_ROOT: ${OA_OBJECT_STORE_ROOT:-/var/lib/openarchive/objects}
      OA_S3_ENDPOINT: ${OA_S3_ENDPOINT:-}
      OA_S3_REGION: ${OA_S3_REGION:-}
      OA_S3_BUCKET: ${OA_S3_BUCKET:-}
      OA_S3_ACCESS_KEY_ID: ${OA_S3_ACCESS_KEY_ID:-}
      OA_S3_SECRET_ACCESS_KEY: ${OA_S3_SECRET_ACCESS_KEY:-}
      OA_S3_KEY_PREFIX: ${OA_S3_KEY_PREFIX:-}
      OA_S3_URL_STYLE: ${OA_S3_URL_STYLE:-path}
      OA_INFERENCE_PROVIDER: ${OA_INFERENCE_PROVIDER:-stub}
      OA_INFERENCE_MODE: ${OA_INFERENCE_MODE:-batch}
      OA_OPENAI_API_KEY: ${OA_OPENAI_API_KEY:-}
      OA_OPENAI_BASE_URL: ${OA_OPENAI_BASE_URL:-https://api.openai.com/v1}
      OA_OPENAI_MAX_OUTPUT_TOKENS: ${OA_OPENAI_MAX_OUTPUT_TOKENS:-4000}
      OA_OPENAI_REASONING_EFFORT: ${OA_OPENAI_REASONING_EFFORT:-low}
      OA_OPENAI_STANDARD_MODEL: ${OA_OPENAI_STANDARD_MODEL:-gpt-5-mini}
      OA_OPENAI_QUALITY_MODEL: ${OA_OPENAI_QUALITY_MODEL:-}
      OA_GEMINI_API_KEY: ${OA_GEMINI_API_KEY:-}
      OA_GEMINI_BASE_URL: ${OA_GEMINI_BASE_URL:-https://generativelanguage.googleapis.com/v1beta}
      OA_GEMINI_MAX_OUTPUT_TOKENS: ${OA_GEMINI_MAX_OUTPUT_TOKENS:-4000}
      OA_GEMINI_STANDARD_MODEL: ${OA_GEMINI_STANDARD_MODEL:-gemini-2.5-flash-lite}
      OA_GEMINI_QUALITY_MODEL: ${OA_GEMINI_QUALITY_MODEL:-}
      OA_GEMINI_BATCH_ENABLED: ${OA_GEMINI_BATCH_ENABLED:-false}
      OA_GEMINI_BATCH_MAX_JOBS: ${OA_GEMINI_BATCH_MAX_JOBS:-16}
      OA_GEMINI_BATCH_MAX_BYTES: ${OA_GEMINI_BATCH_MAX_BYTES:-1500000}
      OA_GEMINI_BATCH_POLL_INTERVAL_MS: ${OA_GEMINI_BATCH_POLL_INTERVAL_MS:-5000}
      OA_ANTHROPIC_API_KEY: ${OA_ANTHROPIC_API_KEY:-}
      OA_ANTHROPIC_BASE_URL: ${OA_ANTHROPIC_BASE_URL:-https://api.anthropic.com/v1}
      OA_ANTHROPIC_MAX_OUTPUT_TOKENS: ${OA_ANTHROPIC_MAX_OUTPUT_TOKENS:-4000}
      OA_ANTHROPIC_STANDARD_MODEL: ${OA_ANTHROPIC_STANDARD_MODEL:-claude-sonnet-4-20250514}
      OA_ANTHROPIC_QUALITY_MODEL: ${OA_ANTHROPIC_QUALITY_MODEL:-}
      OA_GROK_API_KEY: ${OA_GROK_API_KEY:-}
      OA_GROK_BASE_URL: ${OA_GROK_BASE_URL:-https://api.x.ai/v1}
      OA_GROK_MAX_OUTPUT_TOKENS: ${OA_GROK_MAX_OUTPUT_TOKENS:-4000}
      OA_GROK_STANDARD_MODEL: ${OA_GROK_STANDARD_MODEL:-grok-4-fast-reasoning}
      OA_GROK_QUALITY_MODEL: ${OA_GROK_QUALITY_MODEL:-}
      OA_HTTP_BIND: ${OA_HTTP_BIND:-0.0.0.0:3000}
      OA_HTTP_REQUEST_WORKERS: ${OA_HTTP_REQUEST_WORKERS:-2}
      OA_ENRICHMENT_WORKERS: ${OA_ENRICHMENT_WORKERS:-1}
      OA_ENRICHMENT_POLL_INTERVAL_MS: ${OA_ENRICHMENT_POLL_INTERVAL_MS:-500}
      OA_EXTRACT_WORKERS: ${OA_EXTRACT_WORKERS:-1}
      OA_EXTRACT_BATCH_SIZE: ${OA_EXTRACT_BATCH_SIZE:-5}
      OA_EXTRACT_MAX_CONCURRENT: ${OA_EXTRACT_MAX_CONCURRENT:-3}
      OA_RECONCILE_WORKERS: ${OA_RECONCILE_WORKERS:-1}
      OA_RECONCILE_BATCH_SIZE: ${OA_RECONCILE_BATCH_SIZE:-5}
      OA_RECONCILE_MAX_CONCURRENT: ${OA_RECONCILE_MAX_CONCURRENT:-2}
      OA_RETRIEVE_CONTEXT_WORKERS: ${OA_RETRIEVE_CONTEXT_WORKERS:-2}
      RUST_LOG: ${RUST_LOG:-info}
    ports:
      - "3000:3000"
    volumes:
      - object_data:/var/lib/openarchive/objects
    healthcheck:
      test: ["CMD-SHELL", "curl --fail --silent http://127.0.0.1:3000/artifacts >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 12

  ollama:
    image: ollama/ollama:latest
    profiles: ["ollama"]
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

  oracle:
    image: ${OA_ORACLE_IMAGE:-container-registry.oracle.com/database/free:latest-lite}
    profiles: ["oracle"]
    ports:
      - "1521:1521"
      - "5500:5500"
    environment:
      ORACLE_PWD: ${OA_ORACLE_CONTAINER_PASSWORD:-openarchive}
    volumes:
      - oracle_data:/opt/oracle/oradata

volumes:
  postgres_data:
  object_data:
  ollama_data:
  oracle_data:
