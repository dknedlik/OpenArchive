id: "09"
title: Add enrichment worker skeleton
assignee: david
status: todo
type: feature
priority: medium
planned_order: 8
milestone: M1.first_vertical_slice
labels: [jobs, enrichment, workers]
depends_on: ["06"]
description: |
  Add the first bounded in-process worker skeleton that can claim pending
  enrichment jobs and update lifecycle state, even before full AI extraction is implemented.
acceptance_criteria:
  - Worker code can claim a pending job and mark it running.
  - Job completion and failure status transitions are modeled explicitly.
  - The worker contract remains compatible with future out-of-process execution.
files_touched:
  - src/
implementation_plan: |
  - Implement claim/update lifecycle operations against `oa_enrichment_job`.
  - Start with a no-op or stub processor that exercises status transitions.
test_plan: |
  - Add tests for claim/update/complete/fail flows and basic retryable behavior.
risks: |
  - Concurrency and claim semantics are easy places for backend-specific behavior to leak.
notes: |
  - This is only the execution skeleton, not the full summary/classification/memory pipeline.
