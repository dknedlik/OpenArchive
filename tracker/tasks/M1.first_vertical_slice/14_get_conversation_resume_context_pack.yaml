id: "14"
title: Add GET /context-packs/conversation-resume endpoint
assignee: david
status: cancelled
type: feature
priority: high
planned_order: 13
milestone: M1.first_vertical_slice
labels: [api, context-pack, retrieval]
depends_on: ["07", "12", "13"]
description: |
  Historical slice-one task for the first context-pack retrieval use case.
  This work is now superseded by the MVP retrieval milestone, which replaces
  the `conversation_resume` naming and treats context-pack assembly as a
  first-class application service shared by HTTP and MCP transports.
acceptance_criteria:
  - The application exposes one `conversation_resume` retrieval use case that
    is transport-agnostic.
  - The first external transport for this retrieval is MCP.
  - A secured API surface can expose the same retrieval contract without
    re-implementing business logic.
  - The endpoint accepts a conversation/artifact identifier as input.
  - Successful responses include compact machine-readable summary, memories, classifications, supporting evidence, provenance, and policy fields.
  - Supporting evidence references message segments and short excerpts rather than full transcript dumps.
  - The response is assembled from persisted artifact, segment, derived-object, and evidence-link rows.
files_touched:
  - src/
implementation_plan: |
  - Add read-model queries for active summaries, classifications, memories, and their evidence.
  - Assemble the first `conversation_resume` response shape directly from persisted rows.
  - Keep the application use case transport-agnostic, then expose it through MCP first.
  - Keep the response optimized for machine consumption, not browsing.
test_plan: |
  - Add retrieval tests covering a successful response for one enriched artifact.
  - Add transport-level coverage for the first MCP exposure.
  - Verify the response includes provenance-bearing identifiers and evidence-backed excerpts.
risks: |
  - If this endpoint grows into a transcript browser, it will lose the compact working-memory shape the slice is meant to prove.
notes: |
  - Superseded by M2 tasks `03` and `06`.
  - The old `conversation_resume` name should not be used for new code.
