id: "05"
title: Add POST /imports/chatgpt endpoint
assignee: david
status: todo
type: feature
priority: high
planned_order: 4
milestone: M1.first_vertical_slice
labels: [api, ingestion, http]
depends_on: ["03", "04"]
description: |
  Add the first HTTP endpoint for slice one so a ChatGPT export payload can be
  submitted through the service and persisted through the canonical import path.
acceptance_criteria:
  - The service exposes `POST /imports/chatgpt`.
  - A valid request persists import data and returns import id, artifact ids, import status, and enrichment status.
  - The endpoint does not wait for enrichment completion.
files_touched:
  - src/
implementation_plan: |
  - Introduce a minimal HTTP server and request routing.
  - Wire the parser and write path into one application service entrypoint.
  - Keep the response compact and machine-oriented.
test_plan: |
  - Add request/response tests for success and malformed input.
risks: |
  - It is easy to let transport concerns bleed into domain code at this point.
notes: |
  - Keep this endpoint narrow; broader API design is out of scope for now.
