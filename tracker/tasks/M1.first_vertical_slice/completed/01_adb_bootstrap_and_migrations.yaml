implementation_plan: |
  - Document the slice-one schema.
  - Create a CLI-first Oracle bootstrap path using OCI CLI, SQLcl, and the existing wallet.
  - Build a small Rust migration runner for Oracle-backed schema changes.
test_plan: |
  - Verify `adb-check`, `migrate`, and `migrate-check` against the live ADB schema user.
risks: |
