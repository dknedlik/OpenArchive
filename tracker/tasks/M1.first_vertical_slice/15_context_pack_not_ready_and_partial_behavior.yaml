id: "15"
title: Add not-ready and partial-enrichment context-pack behavior
assignee: david
status: todo
type: feature
priority: medium
planned_order: 14
milestone: M1.first_vertical_slice
labels: [api, context-pack, status]
depends_on: ["13", "14"]
description: |
  Make `conversation_resume` retrieval handle not-ready and partial enrichment
  states explicitly so clients can distinguish "nothing available yet" from
  "best available pack with gaps." The same semantics should hold across MCP
  and any secured API surface.
acceptance_criteria:
  - The retrieval contract returns a documented not-ready response when minimum required enrichment has not completed yet.
  - Partial enrichment can return the best available pack only when the minimum required output set exists.
  - Response behavior is driven by persisted artifact/derived-object status rather than in-memory worker state.
  - Error and not-ready cases remain machine-readable and compact.
  - MCP and secured API transports do not invent different readiness semantics.
files_touched:
  - src/
implementation_plan: |
  - Define the minimum derived-output set required to assemble a usable `conversation_resume`.
  - Return explicit not-ready output when the minimum set is absent.
  - Allow partial packs only when they remain grounded and coherent.
  - Keep readiness semantics in the application layer so MCP and secured API
    adapters can share the same rules.
test_plan: |
  - Add retrieval tests for not-ready, partial, and ready states.
  - Add transport-level coverage for the first MCP exposure of those states.
  - Verify incomplete enrichment does not accidentally return misleading empty fields as if the pack were complete.
risks: |
  - Without explicit semantics here, clients will treat absent metadata as complete metadata and produce misleading downstream behavior.
notes: |
  - This task is about response semantics, not new enrichment logic.
  - The semantics should be defined once and then exposed consistently through
    MCP and any secured API surface.
